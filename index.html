<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Grid Tactics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
    <style>
        :root {
            --grid-size: 5;
            --cell-size: 65px;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #setup-screen {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            background: #2a2a35;
            padding: 20px;
            border-radius: 8px;
            box-sizing: border-box;
        }
        #setup-screen h1 { text-align: center; margin: 0 0 10px 0; font-size: 1.8rem; }
        .setup-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
            background: #343444;
            border-radius: 6px;
        }
        input { padding: 10px; background: #1e1e24; color: #fff; border: 1px solid #555; border-radius: 4px; font-size: 1.1rem; text-align: center; }
        button { padding: 12px; background: #4a90e2; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: opacity 0.3s, background 0.3s; }
        button:hover:not(:disabled) { background: #357abd; }
        
        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #game-screen { display: none; width: 100%; max-width: 400px; flex-direction: column; gap: 8px; }
        
        .hp-display-box {
            font-size: 2.8rem;
            font-weight: bold;
            text-align: center;
            padding: 2px 0;
            line-height: 1;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }
        .opp-hp-color { color: #e74c3c; } 
        .my-hp-color { color: #2ecc71; }  

        .status-bar { display: flex; justify-content: space-between; background: #2a2a35; padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; border: 2px solid transparent; }
        .status-bar.my-turn { background: #1e3d2f; border-color: #2ecc71; }
        .status-bar.opp-turn { background: #3d1e1e; border-color: #e74c3c; }

        #turn-banner {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            color: white; padding: 20px 50px;
            font-size: 2.5rem; font-weight: bold; border-radius: 12px; z-index: 100;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s;
            opacity: 0; pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #turn-banner.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        
        #board {
            display: grid; grid-template-columns: repeat(var(--grid-size), var(--cell-size));
            grid-template-rows: repeat(var(--grid-size), var(--cell-size));
            gap: 4px; background: #111; padding: 4px; border-radius: 8px; margin: 0 auto;
        }
        .cell {
            background: #333; border-radius: 4px; position: relative;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .cell.spawn-zone-p1 { background: #223322; border: 1px dashed #44aa44; }
        .cell.spawn-zone-p2 { background: #332222; border: 1px dashed #aa4444; }
        
        .cell.highlight-move { background: #34495e; border: 2px solid #3498db; }
        .cell.highlight-attack { background: #5c2525; border: 2px solid #e74c3c; }
        .cell.highlight-both { background: #48234e; border: 2px solid #9b59b6; } 

        .unit { width: 85%; height: 85%; position: relative; display: flex; align-items: center; justify-content: center; transition: opacity 0.3s; }
        .unit.has-attacked { opacity: 0.4; }

        .unit-body {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            clip-path: polygon(50% 0%, 100% 25%, 100% 100%, 0% 100%, 0% 25%);
            z-index: 1; transition: transform 0.25s ease;
        }
        .unit.p1 .unit-body { background: #2ecc71; box-shadow: inset 0 -5px 10px rgba(0,0,0,0.4); }
        .unit.p2 .unit-body { background: #e74c3c; box-shadow: inset 0 -5px 10px rgba(0,0,0,0.4); }
        
        /* 🌟 盤面テキストの視認性を極限まで高めるクッキリ黒縁取り */
        .unit-text {
            position: relative; z-index: 2; color: white; font-size: 0.7rem; font-weight: bold; text-align: center;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            pointer-events: none; margin-top: 8px;
            line-height: 1.2;
        }

        .dir-0 { transform: rotate(0deg); }   
        .dir-1 { transform: rotate(90deg); }  
        .dir-2 { transform: rotate(180deg); } 
        .dir-3 { transform: rotate(270deg); } 

        #hand { display: flex; gap: 8px; justify-content: center; margin-top: 5px; min-height: 85px;}
        .card { width: 75px; background: #2a2a35; border: 2px solid #555; border-radius: 6px; padding: 6px 4px; font-size: 0.7rem; text-align: center; cursor: pointer; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
        .card.selected { border-color: #f1c40f; background: #3a3a4c; }
        #controls { display: flex; justify-content: space-between; gap: 5px; }
        #log { background: #111; height: 60px; overflow-y: auto; font-size: 0.75rem; padding: 5px; border-radius: 4px; color: #aaa; }

        /* 🌟 勝敗リザルト画面用モーダル */
        #game-over-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 20, 0.9); z-index: 200;
            flex-direction: column; align-items: center; justify-content: center; gap: 15px;
        }
        #game-over-result { font-size: 3.5rem; font-weight: bold; margin: 0; text-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        #game-over-turns { font-size: 1.3rem; margin: 0; color: #aaa; font-weight: 500; }
    </style>
</head>
<body>

    <div id="turn-banner">Your Turn</div>

    <!-- 🌟 勝敗結果表示スクリーン -->
    <div id="game-over-screen">
        <h1 id="game-over-result">RESULT</h1>
        <p id="game-over-turns">経過ターン数: --</p>
    </div>

    <div id="setup-screen">
        <h1>Grid Tactics P2P</h1>
        <div class="setup-group">
            <button id="btn-create-room">部屋を作る (ホスト)</button>
            <div id="room-id-area" style="display:none; text-align:center; margin-top:10px;">
                <div id="display-room-id" style="font-size:1.5rem; font-weight:bold; color:#f1c40f;">-------</div>
            </div>
        </div>
        <div class="setup-group">
            <input type="text" id="input-room-id" maxlength="7" placeholder="部屋番号を入力">
            <button id="btn-join-room" style="background:#2ecc71;">部屋に入る (ゲスト)</button>
        </div>
    </div>

    <div id="game-screen">
        <div id="opp-hp" class="hp-display-box opp-hp-color">10</div>
        <div id="turn-bar" class="status-bar">
            <div>ターン: <span id="current-turn">-</span></div>
            <div>フェーズ: <span id="current-phase">召喚</span></div>
        </div>
        <div id="board"></div>
        <div id="my-hp" class="hp-display-box my-hp-color">10</div>
        
        <!-- 🌟 ボタン名を英語化、Spinボタンの色を鮮やかなゴールドオレンジに変更 -->
        <div id="controls">
            <button id="btn-mode-move">Move</button>
            <button id="btn-mode-attack">Attack</button>
            <button id="btn-rotate" style="background:#f39c12;">Spin</button>
            <button id="btn-end-turn" style="background:#e67e22;">Turn End</button>
        </div>
        <div id="hand"></div>
        <div id="log"></div>
    </div>

    <script>
        const GRID_SIZE = 5; 
        const CARD_DATA = [
            { id: 'u1', name: 'ソルジャー', type: 'unit', hp: 4, atk: 2, move: 1, range: 1 },
            { id: 'u2', name: 'スカウト', type: 'unit', hp: 3, atk: 1, move: 2, range: 1 },
            { id: 'u3', name: 'アーチャー', type: 'unit', hp: 2, atk: 1, move: 1, range: 2 },
            { id: 'c1', name: '妨害', type: 'counter', desc: '移動を阻害' }
        ];

        let state = {
            role: null, isMyTurn: false, turnOwner: 'p1', firstTurn: 'p1', phase: 'summon',
            summonsThisTurn: 0, maxSummons: 1, turnCount: 1, isGameOver: false,
            hp: { p1: 10, p2: 10 }, board: Array(25).fill(null), hand: [],
            selectedCardIdx: null, selectedBoardIdx: null, actionMode: 'move'
        };

        let peer = null, conn = null;

        function generateRoomId() {
            return Math.random().toString(36).substring(2, 9).toUpperCase();
        }

        document.getElementById('btn-create-room').addEventListener('click', () => {
            const roomId = generateRoomId();
            state.role = 'p1';
            peer = new Peer(roomId);
            peer.on('open', (id) => {
                document.getElementById('display-room-id').innerText = id;
                document.getElementById('room-id-area').style.display = 'block';
            });
            peer.on('connection', (c) => { conn = c; setupConnection(); });
        });

        document.getElementById('btn-join-room').addEventListener('click', () => {
            const roomId = document.getElementById('input-room-id').value.trim().toUpperCase();
            state.role = 'p2';
            peer = new Peer();
            peer.on('open', () => { conn = peer.connect(roomId); setupConnection(); });
        });

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                
                if (state.role === 'p1') {
                    const firstTurn = Math.random() < 0.5 ? 'p1' : 'p2';
                    sendAction({ type: 'START_GAME', firstTurn: firstTurn });
                    initGame(firstTurn);
                }
            });
            conn.on('data', handleRemoteAction);
        }

        function sendAction(a) { if (conn?.open) conn.send(a); }

        function initGame(firstTurn) {
            state.firstTurn = firstTurn;
            state.turnOwner = firstTurn;
            state.isMyTurn = (state.role === firstTurn);
            state.hand = [ {...CARD_DATA[0]}, {...CARD_DATA[1]}, {...CARD_DATA[2]}, {...CARD_DATA[3]} ];
            
            const b = document.getElementById('board');
            b.innerHTML = '';
            for (let v=0; v<25; v++) {
                const i = state.role === 'p1' ? v : 24 - v;
                const c = document.createElement('div');
                c.className = 'cell';
                if (i >= 20) c.classList.add('spawn-zone-p1');
                if (i <= 4) c.classList.add('spawn-zone-p2');
                c.onclick = () => onCellClick(i);
                b.appendChild(c);
            }
            updateUI();
            
            if (state.isMyTurn) {
                triggerTurnBanner("Your Turn", true);
            } else {
                triggerTurnBanner("Enemy Turn", false);
            }
        }

        function triggerTurnBanner(text, isMyTurn) {
            const b = document.getElementById('turn-banner');
            b.innerText = text;
            b.style.background = isMyTurn ? 'rgba(46, 204, 113, 0.95)' : 'rgba(231, 76, 60, 0.95)';
            b.classList.add('show');
            setTimeout(() => b.classList.remove('show'), 1500);
        }

        // 🌟 勝敗結果を画面いっぱいに表示して完全停止する関数
        function showGameOverScreen() {
            const screen = document.getElementById('game-over-screen');
            const resultEl = document.getElementById('game-over-result');
            const turnsEl = document.getElementById('game-over-turns');
            
            const amIWinner = state.hp[state.role] > 0;
            
            if (amIWinner) {
                resultEl.innerText = "YOU WIN";
                resultEl.style.color = "#2ecc71";
            } else {
                resultEl.innerText = "YOU LOSE";
                resultEl.style.color = "#e74c3c";
            }
            
            turnsEl.innerText = `経過ターン数: ${state.turnCount} ターン`;
            screen.style.display = 'flex';
        }

        function updateUI() {
            document.getElementById('my-hp').innerText = state.hp[state.role];
            document.getElementById('opp-hp').innerText = state.hp[state.role === 'p1' ? 'p2' : 'p1'];
            
            const tb = document.getElementById('turn-bar');
            tb.className = `status-bar ${state.isMyTurn ? 'my-turn' : 'opp-turn'}`;
            
            // 🌟 プレイ中も現在の経過ターン数を分かりやすく表示
            document.getElementById('current-turn').innerText = `${state.turnCount} (${state.isMyTurn ? "あなたの番" : "相手の番"})`;

            const activeUnit = state.selectedBoardIdx !== null ? state.board[state.selectedBoardIdx] : null;
            const canControl = state.isMyTurn && activeUnit && activeUnit.owner === state.role;
            
            // 🌟 ゲーム終了時はすべてのボタンを強制無効化
            document.getElementById('btn-mode-move').disabled = state.isGameOver || !canControl || activeUnit.hasMoved || activeUnit.hasRotated;
            document.getElementById('btn-mode-attack').disabled = state.isGameOver || !canControl || activeUnit.hasAttacked;
            document.getElementById('btn-rotate').disabled = state.isGameOver || !canControl || activeUnit.hasMoved || activeUnit.hasRotated;
            document.getElementById('btn-end-turn').disabled = state.isGameOver || !state.isMyTurn;

            document.getElementById('btn-mode-move').style.background = state.actionMode === 'move' ? '#2980b9' : '#34495e';
            document.getElementById('btn-mode-attack').style.background = state.actionMode === 'attack' ? '#c0392b' : '#34495e';

            const b = document.getElementById('board');
            
            const moveTargets = activeUnit ? getMoveTargets(state.selectedBoardIdx, activeUnit) : [];
            const attackTargets = activeUnit ? getAttackTargets(state.selectedBoardIdx, activeUnit) : [];

            for (let v=0; v<25; v++) {
                const i = state.role === 'p1' ? v : 24 - v;
                const cell = b.children[v];
                cell.innerHTML = '';
                cell.classList.remove('highlight-move', 'highlight-attack', 'highlight-both');

                const u = state.board[i];
                if (u) {
                    const el = document.createElement('div');
                    const rot = state.role === 'p2' ? (u.dir + 2) % 4 : u.dir;
                    el.className = `unit ${u.owner} ${u.hasAttacked ? 'has-attacked' : ''}`;
                    
                    // 🌟 盤面：視認性の高い「ネオンイエロー（攻撃）」と「ネオンシアン（体力）」
                    el.innerHTML = `
                        <div class="unit-body dir-${rot}"></div>
                        <div class="unit-text">
                            ${u.name}<br>
                            <span style="color: #ffeb3b;">${u.atk}</span>/<span style="color: #00e5ff;">${u.hp}</span>
                        </div>`;
                    cell.appendChild(el);
                }
                
                const isMove = moveTargets.includes(i);
                const isAttack = attackTargets.includes(i);

                if (isMove && isAttack) {
                    cell.classList.add('highlight-both');
                } else if (isMove) {
                    cell.classList.add('highlight-move');
                } else if (isAttack) {
                    cell.classList.add('highlight-attack');
                }
            }

            const h = document.getElementById('hand');
            h.innerHTML = '';
            state.hand.forEach((c, idx) => {
                const el = document.createElement('div');
                el.className = `card ${state.selectedCardIdx === idx ? 'selected' : ''}`;
                
                // 🌟 手札：盤面と完全に一致させた高コントラストな色分け表示
                if (c.type === 'unit') {
                    el.innerHTML = `
                        <b>${c.name}</b>
                        <div style="margin-top: 4px; line-height: 1.3;">
                            <span style="color: #ffeb3b; font-weight: bold;">攻: ${c.atk}</span><br>
                            <span style="color: #00e5ff; font-weight: bold;">体: ${c.hp}</span>
                        </div>`;
                } else {
                    el.innerHTML = `<b>${c.name}</b><br><span style="color: #aaa; font-size: 0.6rem;">${c.desc}</span>`;
                }
                
                el.onclick = () => { if(state.isMyTurn && !state.isGameOver) { state.selectedCardIdx = idx; state.selectedBoardIdx = null; updateUI(); }};
                h.appendChild(el);
            });
        }

        function getMoveTargets(idx, unit) {
            const targets = [];
            if (!unit || unit.hasMoved || unit.hasRotated || state.isGameOver) return targets;
            const r = Math.floor(idx / 5), c = idx % 5;
            
            [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr, dc]) => {
                for(let s=1; s<=unit.move; s++) {
                    const finalNr = r+dr*s;
                    const realNc = c+dc*s; 
                    if (finalNr<0||finalNr>=5||realNc<0||realNc>=5) break;
                    const nIdx = finalNr*5+realNc, targetU = state.board[nIdx];
                    if (!targetU) {
                        targets.push(nIdx);
                    } else if (targetU.owner !== unit.owner) {
                        break; 
                    }
                }
            });
            return targets;
        }

        function getAttackTargets(idx, unit) {
            const targets = [];
            if (!unit || unit.hasAttacked || state.isGameOver) return targets;
            const r = Math.floor(idx / 5), c = idx % 5;

            const isFarthest = (state.role === 'p1' && idx < 5) || (state.role === 'p2' && idx >= 20);
            if (isFarthest) targets.push(idx);

            const front = [[-1, 0], [0, 1], [1, 0], [0, -1]][unit.dir];
            for(let s=1; s<=unit.range; s++) {
                const nr = r+front[0]*s, nc = c+front[1]*s;
                if (nr>=0&&nr<5&&nc>=0&&nc<5) {
                    targets.push(nr*5+nc); 
                }
            }
            return targets;
        }

        function onCellClick(idx) {
            // 🌟 ゲームオーバー時はクリックを完全遮断
            if (!state.isMyTurn || state.isGameOver) return;
            
            if (state.selectedCardIdx !== null && state.phase === 'summon') {
                const isZone = (state.role === 'p1' && idx >= 20) || (state.role === 'p2' && idx <= 4);
                if (isZone && !state.board[idx]) {
                    const c = state.hand[state.selectedCardIdx];
                    state.board[idx] = { ...c, owner: state.role, dir: state.role==='p1'?0:2, hasMoved:false, hasRotated:false, hasAttacked:false };
                    state.hand.splice(state.selectedCardIdx, 1);
                    state.summonsThisTurn++;
                    state.selectedCardIdx = null;
                    sendAction({ type: 'SUMMON', idx, card: c, dir: state.board[idx].dir });
                    if (state.summonsThisTurn >= state.maxSummons) state.phase = 'action';
                    updateUI();
                }
                return;
            }
            
            const u = state.board[idx];
            if (state.selectedBoardIdx === idx && state.actionMode === 'attack' && u?.owner === state.role) {
                if (getAttackTargets(idx, u).includes(idx)) {
                    u.hasAttacked = true;
                    sendAction({ type: 'ATTACK_DECLARE', from: idx, to: idx });
                    executeAttack(idx, idx);
                    state.selectedBoardIdx = null;
                    return;
                }
            }

            if (u && u.owner === state.role) {
                state.selectedBoardIdx = idx;
                state.selectedCardIdx = null;
                updateUI();
            } else if (state.selectedBoardIdx !== null) {
                const activeU = state.board[state.selectedBoardIdx];
                
                if (state.actionMode === 'move') {
                    if (getMoveTargets(state.selectedBoardIdx, activeU).includes(idx)) {
                        activeU.hasMoved = true;
                        state.board[idx] = activeU; state.board[state.selectedBoardIdx] = null;
                        sendAction({ type: 'MOVE', from: state.selectedBoardIdx, to: idx });
                        state.selectedBoardIdx = null;
                        updateUI();
                    }
                } else if (state.actionMode === 'attack') {
                    if (getAttackTargets(state.selectedBoardIdx, activeU).includes(idx)) {
                        const tarU = state.board[idx];
                        if (tarU && tarU.owner !== state.role) {
                            activeU.hasAttacked = true;
                            sendAction({ type: 'ATTACK_DECLARE', from: state.selectedBoardIdx, to: idx });
                            executeAttack(state.selectedBoardIdx, idx);
                            state.selectedBoardIdx = null;
                        }
                    }
                }
            }
        }

        function executeAttack(f, t) {
            const atkU = state.board[f]; if (!atkU) return;
            if (f === t) {
                const opp = state.role === 'p1' ? 'p2' : 'p1';
                state.hp[opp] = Math.max(0, state.hp[opp] - atkU.atk);
            } else {
                const tarU = state.board[t];
                if (tarU) {
                    tarU.hp -= atkU.atk;
                    if (tarU.hp <= 0) state.board[t] = null;
                }
            }
            updateUI();

            // 🌟 どちらかのプレイヤーのHPが0になったらゲーム終了処理
            if (state.hp.p1 <= 0 || state.hp.p2 <= 0) {
                state.isGameOver = true;
                updateUI();
                showGameOverScreen();
            }
        }

        document.getElementById('btn-rotate').onclick = () => {
            if (state.isGameOver) return;
            const u = state.board[state.selectedBoardIdx];
            if (u && !u.hasMoved && !u.hasRotated) {
                u.dir = (u.dir + 1) % 4; u.hasRotated = true;
                sendAction({ type: 'ROTATE', idx: state.selectedBoardIdx, dir: u.dir });
                state.selectedBoardIdx = null; 
                updateUI();
            }
        };

        document.getElementById('btn-end-turn').onclick = () => {
            if (state.isGameOver) return;
            state.isMyTurn = false;
            const nextOwner = state.role === 'p1' ? 'p2' : 'p1';
            state.turnOwner = nextOwner;
            
            // 🌟 1往復（先攻のプレイヤーに手番が戻る時）したら経過ターン数を+1
            if (nextOwner === state.firstTurn) {
                state.turnCount++;
            }

            sendAction({ type: 'END_TURN', nextTurnCount: state.turnCount });
            triggerTurnBanner("Enemy Turn", false); 
            updateUI();
        };

        document.getElementById('btn-mode-move').onclick = () => { if(!state.isGameOver) { state.actionMode = 'move'; updateUI(); } };
        document.getElementById('btn-mode-attack').onclick = () => { if(!state.isGameOver) { state.actionMode = 'attack'; updateUI(); } };

        function handleRemoteAction(a) {
            if (a.type === 'START_GAME') {
                initGame(a.firstTurn);
                return;
            }
            if (a.type === 'SUMMON') state.board[a.idx] = { ...a.card, owner: state.role==='p1'?'p2':'p1', dir: a.dir, hasMoved:false, hasRotated:false, hasAttacked:false };
            if (a.type === 'MOVE') { state.board[a.to] = state.board[a.from]; state.board[a.from] = null; }
            if (a.type === 'ROTATE') state.board[a.idx].dir = a.dir;
            if (a.type === 'ATTACK_DECLARE') executeAttack(a.from, a.to);
            if (a.type === 'END_TURN') {
                state.isMyTurn = true; 
                state.turnOwner = state.role;
                state.phase = 'summon'; 
                state.summonsThisTurn = 0;
                state.board.forEach(u => { if(u && u.owner === state.role) { u.hasMoved=false; u.hasRotated=false; u.hasAttacked=false; }});
                state.hand.push({...CARD_DATA[Math.floor(Math.random()*4)]});
                
                // 🌟 リモート側からのターン数に同期
                state.turnCount = a.nextTurnCount || state.turnCount;
                if (state.role === state.firstTurn) {
                    // 念のための安全策としてのカウントアップ
                    if (!a.nextTurnCount) state.turnCount++;
                }

                triggerTurnBanner("Your Turn", true); 
            }
            updateUI();
        }
    </script>
</body>
</html>
