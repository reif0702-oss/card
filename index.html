<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Grid Tactics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
    <style>
        :root {
            --grid-size: 4;
            --cell-size: 75px;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-user-select: none;
            user-select: none;
        }
        h1 { margin: 5px 0; font-size: 1.5rem; }
        
        /* 接続画面 */
        #setup-screen {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            background: #2a2a35;
            padding: 20px;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .setup-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
            background: #343444;
            border-radius: 6px;
        }
        input { padding: 10px; background: #1e1e24; color: #fff; border: 1px solid #555; border-radius: 4px; font-size: 1.1rem; text-align: center; letter-spacing: 2px; }
        button { padding: 12px; background: #4a90e2; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        button:hover { background: #357abd; }
        .room-id-display { font-size: 1.5rem; font-weight: bold; color: #f1c40f; text-align: center; margin: 5px 0; letter-spacing: 2px;}

        /* ゲーム画面 */
        #game-screen { display: none; width: 100%; max-width: 400px; flex-direction: column; gap: 10px; }
        .status-bar { display: flex; justify-content: space-between; background: #2a2a35; padding: 10px; border-radius: 8px; font-size: 0.9rem;}
        
        /* 盤面 */
        #board {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), var(--cell-size));
            grid-template-rows: repeat(var(--grid-size), var(--cell-size));
            gap: 4px;
            background: #111;
            padding: 4px;
            border-radius: 8px;
            margin: 0 auto;
        }
        .cell {
            background: #333;
            border-radius: 4px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .cell.spawn-zone-p1 { background: #223322; border: 1px dashed #44aa44; }
        .cell.spawn-zone-p2 { background: #332222; border: 1px dashed #aa4444; }
        .cell.highlight-move { background: #34495e; border: 2px solid #3498db; }
        .cell.highlight-attack { background: #5c2525; border: 2px solid #e74c3c; }

        /* ユニット */
        .unit {
            width: 80%;
            height: 80%;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            position: relative;
            color: white;
        }
        .unit.p1 { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .unit.p2 { background: #e74c3c; box-shadow: 0 0 8px #e74c3c; }
        .unit::after {
            content: '▲';
            position: absolute;
            top: 2px;
            font-size: 0.6rem;
            transition: transform 0.2s;
        }
        .unit.dir-0::after { transform: rotate(0deg); }
        .unit.dir-1::after { transform: rotate(90deg); }
        .unit.dir-2::after { transform: rotate(180deg); }
        .unit.dir-3::after { transform: rotate(270deg); }

        /* カード・操作UI */
        #hand { display: flex; gap: 8px; justify-content: center; margin-top: 5px; min-height: 80px;}
        .card {
            width: 70px;
            background: #2a2a35;
            border: 2px solid #555;
            border-radius: 6px;
            padding: 5px;
            font-size: 0.7rem;
            text-align: center;
            cursor: pointer;
        }
        .card.selected { border-color: #f1c40f; background: #3a3a4c; }
        #controls { display: flex; justify-content: space-between; gap: 5px; }
        #log { background: #111; height: 60px; overflow-y: auto; font-size: 0.75rem; padding: 5px; border-radius: 4px; color: #aaa; }
    </style>
</head>
<body>

    <h1>Grid Tactics P2P</h1>

    <div id="setup-screen">
        <div class="setup-group">
            <button id="btn-create-room">部屋を作る (ホスト)</button>
            <div id="room-id-area" style="display:none; text-align:center; margin-top:10px;">
                <span>対戦相手にこの7桁を伝えてください:</span>
                <div id="display-room-id" class="room-id-display">-------</div>
                <span style="font-size:0.8rem; color:#aaa;">相手の接続を待っています...</span>
            </div>
        </div>

        <div style="text-align: center; font-weight: bold; color: #888;">または</div>

        <div class="setup-group">
            <label for="input-room-id">部屋番号(7桁)を入力して参加:</label>
            <input type="text" id="input-room-id" maxlength="7" placeholder="X1Y2Z3A">
            <button id="btn-join-room" style="background:#2ecc71; margin-top:10px;">部屋に入る (ゲスト)</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="status-bar">
            <div>あなた: <span id="my-role">-</span> | ライフ: <span id="my-hp">10</span></div>
            <div>相手のライフ: <span id="opp-hp">10</span></div>
        </div>
        <div class="status-bar" style="background:#1a1a25;">
            <div>ターン: <span id="current-turn">プレイヤー1</span></div>
            <div>フェーズ: <span id="current-phase">召喚</span> (<span id="summon-count">0</span>枚召喚済)</div>
        </div>

        <div id="board"></div>

        <div id="controls">
            <button id="btn-mode-move">移動/向き</button>
            <button id="btn-mode-attack">攻撃</button>
            <button id="btn-rotate" style="background:#9b59b6;">右回転</button>
            <button id="btn-end-turn" style="background:#e67e22;">ターン終了</button>
        </div>

        <div>手札 (タップして選択後、自陣の点線に召喚):</div>
        <div id="hand"></div>
        
        <div id="log">ゲーム開始を待っています...</div>
    </div>

    <script>
        // --- ゲーム設定 & データ定義 ---
        const GRID_SIZE = 4;
        const CARD_DATA = [
            { id: 'u1', name: 'ソルジャー', type: 'unit', hp: 4, atk: 2, move: 1, range: 1 },
            { id: 'u2', name: 'スカウト', type: 'unit', hp: 3, atk: 1, move: 2, range: 1 },
            { id: 'u3', name: 'アーチャー', type: 'unit', hp: 2, atk: 1, move: 1, range: 2 },
            { id: 'c1', name: '妨害(カウンター)', type: 'counter', desc: '移動を阻害' }
        ];

        let state = {
            role: null, // 'p1' または 'p2'
            isMyTurn: false,
            turnOwner: 'p1',
            phase: 'summon',
            summonsThisTurn: 0,
            maxSummons: 1,
            turnCount: 1,
            hp: { p1: 10, p2: 10 },
            board: Array(GRID_SIZE * GRID_SIZE).fill(null),
            hand: [],
            selectedCardIdx: null,
            selectedBoardIdx: null,
            actionMode: 'move'
        };

        // --- PeerJS を使った超かんたんP2P接続処理 ---
        let peer = null;
        let conn = null;

        // ランダムな7文字の部屋IDを生成する関数
        function generateRoomId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 7; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // ホストとして部屋を作成
        document.getElementById('btn-create-room').addEventListener('click', () => {
            const roomId = generateRoomId();
            state.role = 'p1';
            
            // Peerオブジェクトを部屋IDを指定して初期化
            peer = new Peer(roomId);
            
            peer.on('open', (id) => {
                document.getElementById('display-room-id').innerText = id;
                document.getElementById('room-id-area').style.display = 'block';
                document.getElementById('btn-create-room').disabled = true;
            });

            // ゲストが接続してきたときのイベント
            peer.on('connection', (connection) => {
                conn = connection;
                setupConnection();
            });

            peer.on('error', (err) => {
                alert("エラーが発生しました。もう一度部屋を作り直してください。: " + err.type);
            });
        });

        // ゲストとして部屋に参加
        document.getElementById('btn-join-room').addEventListener('click', () => {
            const roomId = document.getElementById('input-room-id').value.trim().toUpperCase();
            if (roomId.length !== 7) return alert("7桁の部屋番号を入力してください");
            
            state.role = 'p2';
            peer = new Peer(); // ゲストはランダムなIDで初期化
            
            peer.on('open', () => {
                // ホストの部屋IDに接続を仕掛ける
                conn = peer.connect(roomId);
                setupConnection();
            });
        });

        // 接続が確立した後のデータ処理設定
        function setupConnection() {
            conn.on('open', () => {
                // 画面を切り替えてゲーム開始
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                initGame();
            });

            conn.on('data', (data) => {
                handleRemoteAction(data);
            });
        }

        function sendAction(action) {
            if (conn && conn.open) {
                conn.send(action);
            }
        }

        // --- ゲームロジック (前回の核となるシステムをそのまま継承) ---
        function initGame() {
            addLog("対戦が開始されました！");
            document.getElementById('my-role').innerText = state.role === 'p1' ? 'プレイヤー1 (先攻)' : 'プレイヤー2 (後攻)';
            state.isMyTurn = (state.role === 'p1');
            
            state.hand = [ { ...CARD_DATA[0] }, { ...CARD_DATA[1] }, { ...CARD_DATA[2] }, { ...CARD_DATA[3] } ];
            
            createBoardUI();
            updateUI();
        }

        function createBoardUI() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.idx = i;
                if (i >= 12) cell.classList.add('spawn-zone-p1');
                if (i <= 3) cell.classList.add('spawn-zone-p2');
                cell.addEventListener('click', () => onCellClick(i));
                boardEl.appendChild(cell);
            }
        }

        function updateUI() {
            document.getElementById('my-hp').innerText = state.hp[state.role];
            document.getElementById('opp-hp').innerText = state.hp[state.role === 'p1' ? 'p2' : 'p1'];
            document.getElementById('current-turn').innerText = state.turnOwner === 'p1' ? 'プレイヤー1' : 'プレイヤー2';
            document.getElementById('current-phase').innerText = state.phase === 'summon' ? '召喚フェーズ' : 'アクションフェーズ';
            document.getElementById('summon-count').innerText = state.summonsThisTurn;

            document.getElementById('btn-mode-move').style.background = state.actionMode === 'move' ? '#2980b9' : '#34495e';
            document.getElementById('btn-mode-attack').style.background = state.actionMode === 'attack' ? '#c0392b' : '#34495e';

            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.getElementById('board').children[i];
                cell.innerHTML = '';
                cell.classList.remove('highlight-move', 'highlight-attack');

                const unit = state.board[i];
                if (unit) {
                    const unitEl = document.createElement('div');
                    unitEl.className = `unit ${unit.owner} dir-${unit.dir}`;
                    unitEl.innerHTML = `<div>${unit.name}</div><div>${unit.atk}/${unit.hp}</div>`;
                    cell.appendChild(unitEl);
                }
            }

            const handEl = document.getElementById('hand');
            handEl.innerHTML = '';
            state.hand.forEach((card, idx) => {
                const cardEl = document.createElement('div');
                cardEl.className = `card ${state.selectedCardIdx === idx ? 'selected' : ''}`;
                cardEl.innerHTML = `<b>${card.name}</b><br>${card.type==='unit' ? `ATK:${card.atk} HP:${card.hp}` : card.desc}`;
                cardEl.addEventListener('click', () => {
                    if (!state.isMyTurn) return;
                    state.selectedCardIdx = (state.selectedCardIdx === idx) ? null : idx;
                    state.selectedBoardIdx = null;
                    updateUI();
                });
                handEl.appendChild(cardEl);
            });

            if (state.isMyTurn && state.selectedBoardIdx !== null) {
                const unit = state.board[state.selectedBoardIdx];
                if (unit && unit.owner === state.role) {
                    getValidTargets(state.selectedBoardIdx, unit).forEach(idx => {
                        cellClass = state.actionMode === 'move' ? 'highlight-move' : 'highlight-attack';
                        document.getElementById('board').children[idx].classList.add(cellClass);
                    });
                }
            }
        }

        function getValidTargets(idx, unit) {
            const targets = [];
            const r = Math.floor(idx / GRID_SIZE);
            const c = idx % GRID_SIZE;
            const dirVectors = [ [-1, 0], [0, 1], [1, 0], [0, -1] ]; 
            const front = dirVectors[unit.dir];

            if (state.actionMode === 'move') {
                const checkDirs = [ [-1,0], [1,0], [0,-1], [0,1] ];
                checkDirs.forEach(([dr, dc]) => {
                    for(let step=1; step<=unit.move; step++) {
                        const nr = r + dr*step, nc = c + dc*step;
                        if (nr>=0 && nr<GRID_SIZE && nc>=0 && nc<GRID_SIZE) {
                            const nIdx = nr * GRID_SIZE + nc;
                            if (!state.board[nIdx]) targets.push(nIdx);
                        }
                    }
                });
            } else if (state.actionMode === 'attack') {
                for (let step = 1; step <= unit.range; step++) {
                    const nr = r + front[0] * step;
                    const nc = c + front[1] * step;
                    if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE) {
                        targets.push(nr * GRID_SIZE + nc);
                    }
                }
            }
            return targets;
        }

        function onCellClick(idx) {
            if (!state.isMyTurn) {
                if (state.selectedCardIdx !== null && state.hand[state.selectedCardIdx].type === 'counter') {
                    executeCounter(idx);
                }
                return;
            }

            if (state.selectedCardIdx !== null && state.phase === 'summon') {
                const card = state.hand[state.selectedCardIdx];
                if (card.type !== 'unit') return;

                const isSpawnZone = (state.role === 'p1' && idx >= 12) || (state.role === 'p2' && idx <= 3);
                if (isSpawnZone && !state.board[idx]) {
                    const newUnit = { ...card, owner: state.role, dir: state.role === 'p1' ? 0 : 2 };
                    state.board[idx] = newUnit;
                    state.hand.splice(state.selectedCardIdx, 1);
                    state.summonsThisTurn++;
                    state.selectedCardIdx = null;
                    
                    addLog(`あなたが ${card.name} を召喚しました。`);
                    sendAction({ type: 'SUMMON', idx, card, dir: newUnit.dir });

                    if (state.summonsThisTurn >= state.maxSummons) {
                        state.phase = 'action';
                    }
                    updateUI();
                }
                return;
            }

            const clickedUnit = state.board[idx];
            if (clickedUnit && clickedUnit.owner === state.role) {
                state.selectedBoardIdx = idx;
                state.selectedCardIdx = null;
                updateUI();
            } else if (state.selectedBoardIdx !== null) {
                const activeUnit = state.board[state.selectedBoardIdx];
                const validTargets = getValidTargets(state.selectedBoardIdx, activeUnit);
                
                if (validTargets.includes(idx)) {
                    if (state.actionMode === 'move') {
                        state.board[idx] = activeUnit;
                        state.board[state.selectedBoardIdx] = null;
                        addLog(`ユニットが移動しました。`);
                        sendAction({ type: 'MOVE', from: state.selectedBoardIdx, to: idx });
                        state.selectedBoardIdx = null;
                        updateUI();
                    } else if (state.actionMode === 'attack') {
                        addLog(`あなたが攻撃を宣言！相手のカウンターを待っています...`);
                        sendAction({ type: 'ATTACK_DECLARE', from: state.selectedBoardIdx, to: idx });
                        executeAttack(state.selectedBoardIdx, idx);
                        state.selectedBoardIdx = null;
                    }
                }
            }
        }

        function executeAttack(fromIdx, toIdx) {
            const attacker = state.board[fromIdx];
            const target = state.board[toIdx];
            if (target) {
                target.hp -= attacker.atk;
                addLog(`${target.name} に ${attacker.atk} ダメージ！`);
                if (target.hp <= 0) {
                    addLog(`${target.name} が撃破されました。`);
                    state.board[toIdx] = null;
                }
            } else {
                const isDirectAttack = (state.role === 'p1' && toIdx <= 3) || (state.role === 'p2' && toIdx >= 12);
                if (isDirectAttack) {
                    const oppRole = state.role === 'p1' ? 'p2' : 'p1';
                    state.hp[oppRole] = Math.max(0, state.hp[oppRole] - attacker.atk);
                    addLog(`相手にダイレクトアタック！ ${attacker.atk} ダメージ！`);
                    checkWinCondition();
                }
            }
            updateUI();
        }

        function executeCounter(targetIdx) {
            const card = state.hand[state.selectedCardIdx];
            addLog(`カウンター発動！ [${card.name}]`);
            sendAction({ type: 'COUNTER', card: card, idx: targetIdx });
            state.hand.splice(state.selectedCardIdx, 1);
            state.selectedCardIdx = null;
            updateUI();
        }

        document.getElementById('btn-rotate').addEventListener('click', () => {
            if (!state.isMyTurn || state.selectedBoardIdx === null) return;
            const unit = state.board[state.selectedBoardIdx];
            if (unit && unit.owner === state.role) {
                unit.dir = (unit.dir + 1) % 4;
                addLog(`ユニットの向きを変更しました。`);
                sendAction({ type: 'ROTATE', idx: state.selectedBoardIdx, dir: unit.dir });
                updateUI();
            }
        });

        document.getElementById('btn-end-turn').addEventListener('click', () => {
            if (!state.isMyTurn) return;
            state.isMyTurn = false;
            state.turnOwner = state.role === 'p1' ? 'p2' : 'p1';
            sendAction({ type: 'END_TURN' });
            addLog("ターンを終了しました。");
            updateUI();
        });

        document.getElementById('btn-mode-move').addEventListener('click', () => { state.actionMode = 'move'; updateUI(); });
        document.getElementById('btn-mode-attack').addEventListener('click', () => { state.actionMode = 'attack'; updateUI(); });

        function handleRemoteAction(action) {
            switch(action.type) {
                case 'SUMMON':
                    state.board[action.idx] = { ...action.card, owner: state.turnOwner, dir: action.dir };
                    addLog(`相手が ${action.card.name} を召喚しました。`);
                    break;
                case 'MOVE':
                    state.board[action.to] = state.board[action.from];
                    state.board[action.from] = null;
                    addLog(`相手のユニットが移動しました。`);
                    break;
                case 'ROTATE':
                    if (state.board[action.idx]) state.board[action.idx].dir = action.dir;
                    addLog(`相手がユニットの向きを変更しました。`);
                    break;
                case 'ATTACK_DECLARE':
                    addLog(`相手から攻撃宣言！カウンターがあれば発動可能。`);
                    break;
                case 'COUNTER':
                    addLog(`相手がカウンター [${action.card.name}] を使用しました！`);
                    break;
                case 'END_TURN':
                    state.isMyTurn = true;
                    state.turnOwner = state.role;
                    state.phase = 'summon';
                    state.summonsThisTurn = 0;
                    state.turnCount++;
                    if (state.turnCount >= 4) state.maxSummons = 2;
                    addLog(`あなたのターンです！ (ドロー)`);
                    state.hand.push({ ...CARD_DATA[Math.floor(Math.random() * CARD_DATA.length)] });
                    break;
            }
            updateUI();
        }

        function checkWinCondition() {
            if (state.hp.p1 <= 0) alert("プレイヤー2の勝利！");
            if (state.hp.p2 <= 0) alert("プレイヤー1の勝利！");
        }

        function addLog(msg) {
            const logEl = document.getElementById('log');
            logEl.innerHTML += `<div>${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }
    </script>
</body>
</html>
